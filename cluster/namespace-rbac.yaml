apiVersion: v1
kind: Namespace
metadata:
  name: agent-harness
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harness-runner
  namespace: agent-harness
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harness-runner-role
  namespace: agent-harness
rules:
  # Deliberately minimal: the POC only needs to read its own input.
  # No write access to anything, in or out of namespace — this mirrors the
  # "shadow mode holds no external write credentials" boundary from the
  # proposal. Expand only when a real workload needs more, and note why.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harness-runner-binding
  namespace: agent-harness
subjects:
  - kind: ServiceAccount
    name: harness-runner
    namespace: agent-harness
roleRef:
  kind: Role
  name: harness-runner-role
  apiGroup: rbac.authorization.k8s.io
